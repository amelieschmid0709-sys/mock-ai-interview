<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mock-KI Interview mit Mikrofon</title>
</head>
<body>

<h2>Mock-KI Bewerbungsgespräch (Deutsch)</h2>
<button id="startBtn">Interview starten</button>
<button id="nextBtn" style="display:none;">Nächste Frage</button>
<p id="question"></p>

<script>
// Vorprogrammierte Fragen + Zeit pro Frage (ms)
const interviewQuestions = [
  "Guten Tag, wie ist ihr Name?",
  "Stellen Sie sich bitte in einem Satz kurz vor.",
  "Warum sollten wir Sie einstellen?",

];

const answerTimes = [6000, 10000, 15000]; // ms pro Frage

let current = 0;
let recognition;
let questionTimeout;

// Text-to-Speech
function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "de-DE";
  speechSynthesis.speak(utter);
}

// Funktion zur nächsten Frage
function nextQuestion(){
  if(current < interviewQuestions.length){
    const q = interviewQuestions[current];
    document.getElementById("question").innerText = q;
    speak(q);

    // Mikrofon starten
    recognition.start();

    // Timeout, falls Nutzer nicht klickt
    questionTimeout = setTimeout(() => {
      recognition.stop();
      current++;
      if(current >= interviewQuestions.length){
        endInterview();
      }
    }, answerTimes[current]);

  } else {
    endInterview();
  }
}

// Interview beenden
function endInterview(){
  recognition.stop();
  document.getElementById("question").innerText = "Vielen Dank für Ihre Zeit, das Interview ist beendet.";
  speak("Vielen Dank für Ihre Zeit, das Interview ist beendet.");
  document.getElementById("nextBtn").style.display = "none";
}

// Start Button
document.getElementById("startBtn").addEventListener("click", () => {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Bitte Chrome oder Edge benutzen!");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "de-DE";

  recognition.onresult = (event) => {
    const answer = event.results[0][0].transcript;
    console.log("Antwort:", answer); // kann gespeichert werden
  };

  recognition.onerror = (err) => console.log("Mikrofonfehler:", err);

  current = 0;
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "inline";
  nextQuestion();

  // 5 Minuten Gesamt-Timeout
  setTimeout(() => {
    endInterview();
  }, 300000);
});

// Next Button
document.getElementById("nextBtn").addEventListener("click", () => {
  clearTimeout(questionTimeout); // alten Timeout abbrechen
  recognition.stop();            // Mikrofon stoppen
  nextQuestion();                // nächste Frage
});
</script>

</body>
</html>
