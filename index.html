<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KI Interview</title>
</head>
<body>

<h2>KI Bewerbungsgespräch (Deutsch)</h2>

<button id="startBtn">Interview starten</button>
<button id="nextBtn" style="display:none;">Nächste Frage</button>

<p id="question"></p>

<script>
const introText = "Guten Tag, vielen Dank dass Sie an diesem Bewerbungsgespräch teilnehmen. Ich bin Ihre KI und stelle Ihnen im folgenden Gespräch ein paar Fragen. Lassen Sie uns starten.";

const interviewQuestions = [
  "Wie ist Ihr Name?",
  "Stellen Sie sich bitte in einem Satz kurz vor.",
  "Warum sollten wir Sie einstellen?"
];

const answerTimes = [6000, 12000, 15000];

let current = 0;
let recognition;
let questionTimeout;

// 🔹 Speech
function speak(text, callback){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "de-DE";
  utter.onend = () => callback && callback();
  speechSynthesis.speak(utter);
}

// 🔹 Stop Mikro
function stopRecognition(){
  if(recognition){
    try {
      recognition.stop();
    } catch(e){}
  }
}

// 🔹 Interview beenden
function endInterview(){
  clearTimeout(questionTimeout);
  stopRecognition();

  document.getElementById("question").innerText =
    "Vielen Dank für Ihre Zeit, das Interview ist beendet.";

  speak("Vielen Dank für Ihre Zeit, das Interview ist beendet.");

  document.getElementById("nextBtn").style.display = "none";
}

// 🔹 Nächste Frage
function nextQuestion(){
  if(current < interviewQuestions.length){

    const q = interviewQuestions[current];
    document.getElementById("question").innerText = q;

    speak(q, () => {
      stopRecognition();

      try {
        recognition.start();
      } catch(e){}

      questionTimeout = setTimeout(() => {
        stopRecognition();
        current++;
        nextQuestion();
      }, answerTimes[current]);
    });

  } else {
    endInterview();
  }
}

// 🔹 Start Button
document.getElementById("startBtn").addEventListener("click", () => {

  if (!('webkitSpeechRecognition' in window)) {
    alert("Bitte Chrome oder Edge benutzen!");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "de-DE";

  recognition.onresult = (event) => {
    const answer = event.results[0][0].transcript;
    console.log("Antwort:", answer);
  };

  recognition.onerror = (err) => console.log("Mikrofonfehler:", err);

  current = 0;

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "inline";

  document.getElementById("question").innerText = introText;

  speak(introText, () => {
    nextQuestion();
  });

  setTimeout(() => {
    endInterview();
  }, 300000);
});

// 🔹 Next Button
document.getElementById("nextBtn").addEventListener("click", () => {
  clearTimeout(questionTimeout);
  stopRecognition();
  current++;
  nextQuestion();
});
</script>

</body>
</html>
