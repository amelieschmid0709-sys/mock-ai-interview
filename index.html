<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mock-KI Interview mit Mikrofon</title>
</head>
<body>

<h2>Mock-KI Bewerbungsgespräch (Deutsch)</h2>
<button id="startBtn">Interview starten</button>
<p id="question"></p>
<button id="nextBtn" style="display:none;">Antwort fertig → nächste Frage</button>

<script>
const interviewQuestions = [
  "Hallo! Willkommen zum kurzen Bewerbungsgespräch. Wie ist ihr Name ?",
  "Stellen Sie sich in einem Satz kurz vor.",
  "Warum sollten wir Sie einstellen?",
  "Vielen Dank, das Interview ist beendet."
];
const answerTimes = [120, 300, 500, 500]; // ms pro Frage
  
let currentQuestion = 0;
let recognition;
let interviewTimeout;

// TTS
function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "de-DE";
  speechSynthesis.speak(utter);
}

// Starte Interview
document.getElementById("startBtn").addEventListener("click", () => {
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "inline";

  // Init Mikrofon
  recognition = new webkitSpeechRecognition();
  recognition.lang = "de-DE";

 recognition.onresult = (event) => {
  const answer = event.results[0][0].transcript;
  console.log("Antwort:", answer);

  

  recognition.onerror = (err) => console.log("Mikrofonfehler:", err);

  nextQuestion();

  // 5-Minuten Timer
  interviewTimeout = setTimeout(() => {
    recognition.stop();
    document.getElementById("question").innerText = "Interview beendet. Vielen Dank!";
    speak("Interview beendet. Vielen Dank!");
    document.getElementById("nextBtn").style.display = "none";
  }, 300000);
});

// Nächste Frage
function nextQuestion(){
  if(current < interviewQuestions.length){
    const q = interviewQuestions[current];
    document.getElementById("question").innerText = q;
    speak(q);

    // Mikrofon starten
    recognition.start();

    // Antwortzeit abwarten, aber keine Meldung anzeigen
    setTimeout(() => {
      recognition.stop(); // Mikrofon stoppen
      current++;
    }, answerTimes[current]);

  } else {
    document.getElementById("question").innerText = "Interview beendet. Vielen Dank!";
    speak("Interview beendet. Vielen Dank!");
  }
}
  
</script>

</body>
</html>
